server:
    port: 8082
spring:
  application:
      name: lm
  datasource:
    url: jdbc:mariadb://localhost:3306/los_min_db
    driver-class-name: org.mariadb.jdbc.Driver
    username: los_min_user
    password: L0$_m1n_u$3r
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MariaDBDialect
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.credvenn.lm: INFO
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] %logger{36} [corr=%X{correlationId:-},tenant=%X{tenantId:-},app=%X{applicationId:-},user=%X{userId:-}] - %msg%n"

app:
  bootstrap:
    super-admin:
      username: superadmin
      email: superadmin@credvenn.com
      password: ChangeMe123!
  security:
    encryption-key: CHANGE_ME_TO_A_LONG_RANDOM_SECRET
    cors:
      allowed-origins:
        - "*"
      allowed-methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed-headers:
        - "*"
      exposed-headers:
        - Authorization
        - Location
      allow-credentials: false
      max-age-seconds: 3600
    jwt:
      secret: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      issuer: los-be
      service-secret: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      service-issuer: los-be-service
      access-token-expiration-seconds: 900
      refresh-token-expiration-seconds: 1209600
  integration:
    kyc:
      provider: SIMULATED
      smile-id:
        base-url: https://testapi.smileidentity.com
        partner-id: CHANGE_ME
        api-key: CHANGE_ME
        source-sdk-version: 1.0.0
    statement:
      provider: CLADFY
      auto-trigger-document-types:
        - MPESA_STATEMENT
        - BANK_STATEMENT
      document-type-providers:
        MPESA_STATEMENT: mpesa
        BANK_STATEMENT: bank
    fineract:
      base-url: http://localhost:8080/fineract-provider/api/v1
      username: mifos
      password: password
      default-office-id: 1
      legal-form-id: 1
      locale: en
      date-format: dd MMMM yyyy
      transaction-processing-strategy-code: advanced-payment-allocation-strategy
    cladfy:
      base-url: https://service.cladfy.com/v1
      api-key: CHANGE_ME
      webhook-base-url: http://localhost:8080
  document:
    storage:
      provider: LOCAL
      local:
        root-path: ./data/documents
      s3:
        bucket: CHANGE_ME
        region: us-east-1
        prefix: los-documents
        endpoint:
        access-key:
        secret-key:
        path-style-access-enabled: false
  statement-inbox:
